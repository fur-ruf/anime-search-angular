<div style="padding: 20px; font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto;">
  <h1
    style="color: #ff6b6b; text-align: center; cursor: pointer;"
    (click)="goHome()"
  >
    Anime Smart Search
  </h1>

  <div *ngIf="!isDetailPage()" style="display: flex; gap: 10px; margin: 20px 0; justify-content: center;">
    <input
      #searchInput
      type="text"
      placeholder="Поиск аниме..."
      style="flex: 1; max-width: 500px; padding: 12px 16px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none;"
      (keyup.enter)="search(searchInput.value)"
    >
    <button
      (click)="search(searchInput.value)"
      style="padding: 12px 32px; background: #ff6b6b; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;"
    >
      Найти
    </button>
  </div>

  <router-outlet></router-outlet>

  <div *ngIf="!isDetailPage()">
    <div *ngIf="loading" style="color: #666; text-align: center; padding: 60px;">
      Загрузка...
    </div>

    <div *ngIf="error" style="color: red; padding: 20px; background: #ffe0e0; border-radius: 8px; text-align: center;">
      {{ error }}
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; margin-top: 24px;">
      <div
        *ngFor="let anime of animeList"
        class="anime-card"
        [routerLink]="['/anime', anime.mal_id]"
      >
        <img
          [src]="anime.images.jpg.image_url"
          [alt]="anime.title"
          class="anime-image"
          (error)="anime.images.jpg.image_url = 'https://via.placeholder.com/200x260?text=No+Image'"
        >
        <h3 class="anime-title">
          {{ anime.title }}
        </h3>
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666;">
          <span>{{ anime.score || 'N/A' }}</span>
          <span>{{ anime.year || 'Unknown' }}</span>
        </div>
        <div style="display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px;">
          <span *ngFor="let genre of anime.genres.slice(0, 2)" class="genre-tag">
            {{ genre.name }}
          </span>
          <span *ngIf="anime.genres.length > 2" style="font-size: 10px; color: #999;">
            +{{ anime.genres.length - 2 }}
          </span>
        </div>
      </div>
    </div>

    <div *ngIf="animeList.length === 0 && !loading && !error" style="color: #999; text-align: center; padding: 80px; font-size: 18px;">
      Введите название аниме для поиска
    </div>
  </div>
</div>
